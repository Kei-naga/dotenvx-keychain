name: Release Prep

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-prep-linux:
    name: release-prep-linux
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux secret store dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            gnome-keyring \
            libsecret-1-0 \
            libsecret-1-dev \
            libsecret-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run test suite
        run: npm test

      - name: Run Linux real-store smoke
        run: npm run test:real-store-smoke:linux

      - name: Build
        run: npm run build

      - name: Check npm pack contents
        run: npm run pack:dry-run

      - name: Smoke test packaged CLI
        run: npm run pack:smoke

  release-prep-macos:
    name: release-prep-macos
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run macOS real-store smoke
        run: npm run test:real-store-smoke

  release-prep-windows:
    name: release-prep-windows
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Windows real-store smoke
        run: npm run test:real-store-smoke

  release-artifacts:
    name: release-artifacts
    runs-on: ubuntu-latest
    needs:
      - release-prep-linux
      - release-prep-macos
      - release-prep-windows
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release tarball
        run: |
          rm -f ./*.tgz pack-output.json
          npm pack --json > pack-output.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-prep-${{ github.run_id }}
          path: |
            *.tgz
            pack-output.json
          if-no-files-found: error

      - name: Record automated native-store gate
        run: |
          {
            echo '## Automated native-store gate'
            echo ''
            echo '- This workflow reruns native secret-store smoke on ubuntu-latest, macos-latest, and windows-latest before creating release artifacts.'
            echo '- Before npm publish, you may still rerun `npm run test:real-store-smoke` on the release machine as a final environment-specific check.'
            echo '- SemVer tags should be created from the merged `main` commit after these hosted-runner checks succeed.'
          } >> "$GITHUB_STEP_SUMMARY"
